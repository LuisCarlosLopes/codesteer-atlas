name: KB Doc Quality

on:
  pull_request:
    paths:
      - "knowledge-base/**/*.md"
  push:
    branches: [main]
    paths:
      - "knowledge-base/**/*.md"

permissions:
  contents: read

jobs:
  validate:
    name: validate knowledge-base
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validar Base Cognitiva
        run: python3 knowledge-base/.github/scripts/validate_kb.py
