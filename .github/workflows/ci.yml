name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Ruff
        run: uv run --with ruff ruff check

      - name: Validate critical imports
        run: uv run python deploy_mcp.py --check

      - name: Pytest
        run: uv run --python 3.12 --with pytest python -m pytest -v
